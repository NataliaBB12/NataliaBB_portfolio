<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8C4A8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5B396" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <!-- Outer soft circle -->
  <circle cx="100" cy="100" r="95" fill="url(#outerGlow)"/>
  <circle cx="100" cy="100" r="80" fill="#FADCC8"/>
  <!-- Left half — orange -->
  <path d="M100 20 A80 80 0 0 0 100 180 L100 20Z" fill="#E8612D"/>
  <!-- Right half — peach -->
  <path d="M100 20 A80 80 0 0 1 100 180 L100 20Z" fill="#F5C8B0"/>
  <!-- Center divider line -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="#FADCC8" stroke-width="3"/>
</svg>
